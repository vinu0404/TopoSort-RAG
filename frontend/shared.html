<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shared Conversation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f9f9f9;
    color: #1a1a1a;
  }
  .header {
    background: #fff;
    border-bottom: 1px solid #e8e8e8;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header-left svg { stroke: #333; }
  .header h1 {
    font-size: 1rem;
    font-weight: 600;
    color: #333;
  }
  .badge {
    font-size: 0.65rem;
    background: #e8e8e8;
    color: #666;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 500;
  }
  .container {
    max-width: 800px;
    margin: 0 auto;
    padding: 24px 16px 60px;
  }
  .loading {
    text-align: center;
    padding: 60px;
    color: #999;
    font-size: 0.9rem;
  }
  .error {
    text-align: center;
    padding: 60px;
    color: #e53e3e;
    font-size: 0.9rem;
  }
  .msg {
    margin-bottom: 16px;
    display: flex;
    flex-direction: column;
  }
  .msg.user { align-items: flex-end; }
  .msg.assistant { align-items: flex-start; }
  .msg-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #999;
    margin-bottom: 4px;
  }
  .msg-content {
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 0.9rem;
    line-height: 1.6;
    max-width: 85%;
  }
  .msg.user .msg-content {
    background: #000;
    color: #fff;
    border-radius: 16px 16px 4px 16px;
  }
  .msg.assistant .msg-content {
    background: #fff;
    color: #1a1a1a;
    border-radius: 16px 16px 16px 4px;
    border: 1px solid #e8e8e8;
  }
  .msg-meta {
    font-size: 0.65rem;
    color: #bbb;
    margin-top: 4px;
  }

  /* Markdown rendering */
  .msg-content h1, .msg-content h2, .msg-content h3,
  .msg-content h4, .msg-content h5 {
    margin: 14px 0 6px;
    font-weight: 600;
    line-height: 1.3;
  }
  .msg-content h1 { font-size: 1.2rem; }
  .msg-content h2 { font-size: 1.1rem; }
  .msg-content h3 { font-size: 1rem; }
  .msg-content h1:first-child, .msg-content h2:first-child,
  .msg-content h3:first-child { margin-top: 0; }
  .msg-content p { margin: 0 0 8px; }
  .msg-content p:last-child { margin-bottom: 0; }
  .msg-content strong { font-weight: 600; }
  .msg-content em { font-style: italic; }
  .msg-content ul, .msg-content ol {
    margin: 6px 0 10px;
    padding-left: 20px;
  }
  .msg-content li { margin-bottom: 3px; line-height: 1.5; }
  .msg-content code {
    background: rgba(0,0,0,0.06);
    padding: 1px 5px;
    border-radius: 3px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.84em;
  }
  .msg.user .msg-content code {
    background: rgba(255,255,255,0.15);
  }
  .msg-content pre {
    margin: 8px 0;
    border-radius: 6px;
    overflow-x: auto;
    background: #1a1a1a;
    padding: 14px 16px;
  }
  .msg-content pre code {
    background: none;
    padding: 0;
    color: #e0e0e0;
    font-size: 0.82em;
    line-height: 1.5;
  }
  .msg-content table {
    border-collapse: collapse;
    margin: 8px 0;
    font-size: 0.85em;
    width: 100%;
  }
  .msg-content th, .msg-content td {
    border: 1px solid #ddd;
    padding: 6px 10px;
    text-align: left;
  }
  .msg-content th { background: #f0f0f0; font-weight: 600; }
  .msg-content blockquote {
    border-left: 3px solid #ddd;
    padding-left: 12px;
    color: #666;
    margin: 8px 0;
  }
  .footer {
    text-align: center;
    padding: 20px;
    color: #ccc;
    font-size: 0.75rem;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
    <h1 id="convTitle">Shared Conversation</h1>
  </div>
  <span class="badge">read-only</span>
</div>

<div class="container" id="messages">
  <div class="loading" id="loadingMsg">Loading conversation…</div>
</div>

<div class="footer">Shared via MRAG</div>

<script>
const BASE = window.location.origin;
const token = window.location.pathname.split('/shared/')[1];

function escapeHtml(text) {
  return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function renderMarkdown(text) {
  let html = escapeHtml(text);
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
    `<pre><code class="lang-${lang || 'text'}">${code.replace(/\n$/, '')}</code></pre>`);
  html = html.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  html = html.replace(/^##### (.+)$/gm, '<h5>$1</h5>');
  html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  html = html.replace(/^---+$/gm, '<hr>');
  html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>');
  html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
  html = html.replace(/(^[\-\*] .+$\n?)+/gm, (block) => {
    const items = block.trim().split('\n').map(l => `<li>${l.replace(/^[\-\*] /, '')}</li>`).join('');
    return `<ul>${items}</ul>`;
  });
  html = html.replace(/(^\d+\. .+$\n?)+/gm, (block) => {
    const items = block.trim().split('\n').map(l => `<li>${l.replace(/^\d+\. /, '')}</li>`).join('');
    return `<ol>${items}</ol>`;
  });
  html = html.replace(/(^\|.+\|$\n?)+/gm, (block) => {
    const rows = block.trim().split('\n').filter(r => !/^\|[\s\-:]+\|$/.test(r));
    if (!rows.length) return block;
    let table = '<table>';
    rows.forEach((row, i) => {
      const cells = row.split('|').slice(1, -1).map(c => c.trim());
      const tag = i === 0 ? 'th' : 'td';
      if (i === 0) table += '<thead>';
      if (i === 1) table += '</thead><tbody>';
      table += '<tr>' + cells.map(c => `<${tag}>${c}</${tag}>`).join('') + '</tr>';
    });
    table += '</tbody></table>';
    return table;
  });
  html = html.replace(/\n\n/g, '</p><p>');
  html = html.replace(/\n/g, '<br>');
  html = html.replace(/(<\/(?:pre|h[1-5]|ul|ol|table|blockquote|hr)>)<br>/g, '$1');
  html = html.replace(/<br>(<(?:pre|h[1-5]|ul|ol|table|blockquote|hr)[\s>])/g, '$1');
  html = `<p>${html}</p>`;
  html = html.replace(/<p>\s*<\/p>/g, '');
  html = html.replace(/<p>(<(?:pre|h[1-5]|ul|ol|table|blockquote|hr)[\s>])/g, '$1');
  html = html.replace(/(<\/(?:pre|h[1-5]|ul|ol|table|blockquote|hr)>)<\/p>/g, '$1');
  return html;
}

async function load() {
  const container = document.getElementById('messages');
  const loadingMsg = document.getElementById('loadingMsg');

  if (!token) {
    loadingMsg.className = 'error';
    loadingMsg.textContent = 'Invalid share link.';
    return;
  }

  try {
    const res = await fetch(`${BASE}/api/v1/shared/${encodeURIComponent(token)}`);
    if (!res.ok) {
      loadingMsg.className = 'error';
      loadingMsg.textContent = res.status === 404
        ? 'This shared conversation no longer exists.'
        : 'Failed to load conversation.';
      return;
    }

    const data = await res.json();
    document.getElementById('convTitle').textContent = data.title || 'Shared Conversation';
    document.title = (data.title || 'Shared Conversation') + ' — MRAG';

    loadingMsg.remove();

    for (const msg of data.messages) {
      if (msg.role === 'system') continue;
      const div = document.createElement('div');
      div.className = `msg ${msg.role}`;

      const label = document.createElement('div');
      label.className = 'msg-label';
      label.textContent = msg.role === 'user' ? 'You' : 'Assistant';

      const content = document.createElement('div');
      content.className = 'msg-content';
      content.innerHTML = msg.role === 'user' ? escapeHtml(msg.content) : renderMarkdown(msg.content);

      div.appendChild(label);
      div.appendChild(content);

      if (msg.model_used || msg.created_at) {
        const meta = document.createElement('div');
        meta.className = 'msg-meta';
        const parts = [];
        if (msg.model_used) parts.push(msg.model_used);
        if (msg.created_at) parts.push(new Date(msg.created_at).toLocaleString());
        meta.textContent = parts.join(' · ');
        div.appendChild(meta);
      }

      container.appendChild(div);
    }

    if (!data.messages.length) {
      container.innerHTML = '<div class="loading">This conversation has no messages.</div>';
    }
  } catch (e) {
    loadingMsg.className = 'error';
    loadingMsg.textContent = 'Failed to load conversation.';
  }
}

load();
</script>
</body>
</html>
